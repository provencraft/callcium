name: Publish Contracts

on:
  push:
    tags:
      - 'contracts/v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Soldeer
    runs-on: ubuntu-latest
    environment: soldeer
    defaults:
      run:
        working-directory: packages/contracts
    env:
      FOUNDRY_PROFILE: release
      SOLDEER_API_TOKEN: ${{ secrets.SOLDEER_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: forge soldeer install

      - name: Build
        run: forge build

      - name: Test
        run: forge test

      - name: Read version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#contracts/v}" >> "$GITHUB_OUTPUT"

      - name: Dry-run publish
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: forge soldeer push "callcium~${VERSION}" --dry-run --skip-warnings

      - name: Publish
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: forge soldeer push "callcium~${VERSION}" --skip-warnings
