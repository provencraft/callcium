name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FOUNDRY_PROFILE: ci

jobs:
  forge:
    name: Forge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: forge soldeer install

      - name: Run Forge fmt
        run: forge fmt --check
        id: fmt

      - name: Run Forge build
        run: forge build
        id: build

      - name: Run Forge tests
        run: forge test -vvv
        id: test

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build SDK
        working-directory: sdk
        run: bun run build

      - name: Build docs
        working-directory: docs
        run: bun run build

      - name: Lint docs
        working-directory: docs
        run: bun run lint

  sdk:
    name: SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: sdk
        run: bun install

      - name: Check formatting
        working-directory: sdk
        run: bun run fmt:check

      - name: Lint
        working-directory: sdk
        run: bun run lint

      - name: Type check
        working-directory: sdk
        run: bun run typecheck

      - name: Build
        working-directory: sdk
        run: bun run build

      - name: Run tests
        working-directory: sdk
        run: bun test