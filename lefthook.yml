pre-commit:
  commands:
    # Contracts
    forge-fmt:
      root: "packages/contracts/"
      glob: "packages/contracts/{src,test}/**/*.sol"
      run: forge fmt --check {staged_files}

    # SDK
    sdk-fmt:
      root: "packages/sdk/"
      glob: "packages/sdk/**/*.{ts,json,md}"
      run: bunx oxfmt --check {staged_files}

    sdk-lint:
      root: "packages/sdk/"
      glob: "packages/sdk/**/*.ts"
      run: bunx oxlint {staged_files}

    sdk-typecheck:
      root: "packages/sdk/"
      glob: "packages/sdk/**/*.ts"
      run: bun run typecheck

    # Docs
    docs-fmt:
      root: "packages/docs/"
      glob: "packages/docs/**/*.{ts,tsx,mjs,css,json,md,mdx}"
      run: bunx oxfmt --check {staged_files}

    docs-lint:
      root: "packages/docs/"
      glob: "packages/docs/**/*.{ts,tsx}"
      run: bunx oxlint {staged_files}

    docs-typecheck:
      root: "packages/docs/"
      glob: "packages/docs/**/*.{ts,tsx}"
      run: bun run types:check

    docs-sync-solidity:
      root: "packages/docs/"
      glob:
        - "packages/contracts/src/**/*.sol"
        - "packages/contracts/foundry.toml"
        - "packages/docs/tools/sync-reference.ts"
        - "packages/docs/tools/sol-symbol-map.ts"
      run: bun run sync:reference && git add content/docs/solidity/reference

    docs-sync-sdk:
      root: "packages/docs/"
      glob:
        - "packages/sdk/src/**/*.ts"
        - "packages/sdk/typedoc.json"
        - "packages/docs/tools/sync-sdk-reference.ts"
      run: bun run sync:sdk-reference && git add content/docs/sdk/reference

    docs-sync-specs:
      root: "packages/docs/"
      glob:
        - "spec/**/*.md"
        - "packages/docs/tools/sync-specs.ts"
      run: bun run sync:specs && git add "content/docs/(protocol)/specifications"
