pre-commit:
  commands:
    forge-fmt:
      root: "packages/contracts/"
      glob: "packages/contracts/{src,test}/**/*.sol"
      run: forge fmt --check {staged_files}

    docs-fmt:
      root: "packages/docs/"
      glob: "packages/docs/**/*.{ts,tsx,mjs,css,json,md,mdx}"
      run: bunx oxfmt --check {staged_files}

    docs-lint:
      root: "packages/docs/"
      glob: "packages/docs/**/*.{ts,tsx}"
      run: bunx oxlint {staged_files}

    sdk-fmt:
      root: "packages/sdk/"
      glob: "packages/sdk/**/*.{ts,json,md}"
      run: bunx oxfmt --check {staged_files}

    sdk-lint:
      root: "packages/sdk/"
      glob: "packages/sdk/**/*.ts"
      run: bunx oxlint {staged_files}
